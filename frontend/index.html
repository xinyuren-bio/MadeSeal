<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>钢蛋印章制作</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
</head>
<body class="page-editor">

<header class="site-header">
  <div class="site-header-inner">
    <span class="site-title">钢蛋印章制作</span>
  </div>
</header>

<main class="editor-main">
  <!-- 预览区 -->
  <section class="preview-section">
    <div class="preview-canvas-wrap">
      <canvas id="preview-canvas"></canvas>
    </div>
    <div class="color-panel">
      <input type="text" id="color-hex" class="color-hex-input" value="#b02022" maxlength="7">
      <div class="color-swatches" id="color-swatches"></div>
    </div>
  </section>

  <!-- 设置标签页 -->
  <nav class="tab-nav" id="tab-nav">
    <button type="button" class="tab-btn active" data-tab="basic">基础设置</button>
    <button type="button" class="tab-btn" data-tab="advanced">高级设置</button>
    <button type="button" class="tab-btn" data-tab="other">其他设置</button>
  </nav>

  <!-- 基础设置 -->
  <section class="tab-panel active" id="tab-basic">
    <div class="form-group">
      <label for="sealFormat">印章格式</label>
      <select id="sealFormat">
        <option value="standard">格式一：上弧标题 + 中心副标题</option>
        <option value="village">格式二：上弧标题村民委员会 + 下弧编码</option>
      </select>
    </div>
    <div class="form-group">
      <label for="title" id="title-label">标题</label>
      <input type="text" id="title" maxlength="30" placeholder="请输入上弧标题">
    </div>
    <div class="form-group" id="subtitle-group">
      <label for="subtitle">副标题</label>
      <input type="text" id="subtitle" maxlength="12">
    </div>
    <div class="form-group hidden" id="serial-group">
      <label for="serial">编码</label>
      <input type="text" id="serial" maxlength="25" placeholder="下弧编码">
    </div>
    <div class="form-group">
      <label for="font">字体</label>
      <select id="font">
        <option value="sourceHan">思源宋体</option>
        <option value="system">系统-默认</option>
        <option value="heiti">黑体</option>
        <option value="kaiti">楷体</option>
      </select>
    </div>
    <div class="form-group">
      <label for="fontBold">加粗 <span id="fontBold-label">48</span></label>
      <input type="range" id="fontBold" min="0" max="100" value="48" step="1">
      <p class="form-hint">数值越大文字越粗，适合公章观感</p>
    </div>
    <div class="form-group">
      <label for="colorDepth">颜色加深 <span id="colorDepth-label">45</span></label>
      <input type="range" id="colorDepth" min="0" max="100" value="45" step="1">
      <p class="form-hint">默认接近实物印泥红，数值越大越深</p>
    </div>
    <div class="form-group">
      <label for="agingLevel">做旧|老化 <span id="agingLevel-label">42</span></label>
      <input type="range" id="agingLevel" min="0" max="100" value="42" step="1">
      <p class="form-hint" id="agingLevel-hint">中度做旧</p>
    </div>
  </section>

  <!-- 高级设置 -->
  <section class="tab-panel" id="tab-advanced">
    <div class="slider-group">
      <h3>标题</h3>
      <div class="slider-row"><label>大小</label><input type="range" id="titleSize" min="10" max="70" value="50"><span class="slider-val" id="titleSize-val">50</span></div>
      <div class="slider-row"><label>位置</label><input type="range" id="titlePos" min="80" max="180" value="150"><span class="slider-val" id="titlePos-val">150</span></div>
      <div class="slider-row"><label>角度</label><input type="range" id="titleAngle" min="120" max="270" value="220"><span class="slider-val" id="titleAngle-val">220</span></div>
    </div>
    <div class="slider-group" id="subtitle-advanced-group">
      <h3>副标题</h3>
      <div class="slider-row"><label>大小</label><input type="range" id="subtitleSize" min="10" max="60" value="40"><span class="slider-val" id="subtitleSize-val">40</span></div>
      <div class="slider-row"><label>位置</label><input type="range" id="subtitlePos" min="20" max="120" value="78"><span class="slider-val" id="subtitlePos-val">78</span></div>
    </div>
    <div class="slider-group hidden" id="serial-advanced-group">
      <h3>编码</h3>
      <div class="slider-row"><label>大小</label><input type="range" id="serialSize" min="8" max="40" value="18"><span class="slider-val" id="serialSize-val">18</span></div>
      <div class="slider-row"><label>间距</label><input type="range" id="serialOffset" min="-35" max="15" value="10"><span class="slider-val" id="serialOffset-val">10</span></div>
      <p class="form-hint">间距相对标题位置自动联动，正值更靠外</p>
      <div class="slider-row"><label>角度</label><input type="range" id="serialAngle" min="60" max="240" value="90"><span class="slider-val" id="serialAngle-val">90</span></div>
      <p class="form-hint">实际角度按字数自动收紧，不超过此上限</p>
    </div>
    <div class="slider-group">
      <h3>五角星</h3>
      <div class="slider-row"><label>大小</label><input type="range" id="starSize" min="20" max="140" value="100"><span class="slider-val" id="starSize-val">100</span></div>
      <div class="slider-row"><label>位置</label><input type="range" id="starPos" min="-60" max="60" value="0"><span class="slider-val" id="starPos-val">0</span></div>
    </div>
    <div class="slider-group">
      <h3>外边框</h3>
      <div class="slider-row"><label>大小</label><input type="range" id="borderSize" min="2" max="24" value="12"><span class="slider-val" id="borderSize-val">12</span></div>
    </div>
  </section>

  <!-- 其他设置 -->
  <section class="tab-panel" id="tab-other">
    <div class="slider-group">
      <h3>标题</h3>
      <div class="slider-row"><label>字宽</label><input type="range" id="titleScaleX" min="0.3" max="2" step="0.1" value="0.8"><span class="slider-val" id="titleScaleX-val">0.8</span></div>
      <div class="slider-row"><label>字高</label><input type="range" id="titleScaleY" min="0.3" max="2" step="0.1" value="1"><span class="slider-val" id="titleScaleY-val">1</span></div>
    </div>
    <div class="slider-group" id="subtitle-other-group">
      <h3>副标题</h3>
      <div class="slider-row"><label>字宽</label><input type="range" id="subtitleScaleX" min="0.3" max="2" step="0.1" value="0.8"><span class="slider-val" id="subtitleScaleX-val">0.8</span></div>
      <div class="slider-row"><label>字高</label><input type="range" id="subtitleScaleY" min="0.3" max="2" step="0.1" value="1"><span class="slider-val" id="subtitleScaleY-val">1</span></div>
    </div>
    <div class="slider-group hidden" id="serial-other-group">
      <h3>编码</h3>
      <div class="slider-row"><label>字宽</label><input type="range" id="serialScaleX" min="0.3" max="2" step="0.1" value="1"><span class="slider-val" id="serialScaleX-val">1</span></div>
      <div class="slider-row"><label>字高</label><input type="range" id="serialScaleY" min="0.3" max="2" step="0.1" value="1"><span class="slider-val" id="serialScaleY-val">1</span></div>
    </div>
    <div class="form-group">
      <label for="output-size">输出尺寸 <span id="size-label">400px</span></label>
      <input type="range" id="output-size" min="200" max="800" value="400" step="10">
    </div>
  </section>

  <p class="disclaimer-text">
    免责声明：本工具生成的印章图片没有法律效力，仅供个人学习和内部交流使用。
  </p>
</main>

<!-- 下载按钮 -->
<button type="button" class="btn-download-fixed" id="btn-download">下载</button>

<!-- 手机端保存弹窗：长按图片保存 -->
<div class="save-modal hidden" id="save-modal" role="dialog" aria-modal="true">
  <div class="save-modal-backdrop" id="save-modal-backdrop"></div>
  <div class="save-modal-panel">
    <button type="button" class="save-modal-close" id="save-modal-close" aria-label="关闭">×</button>
    <h2 class="save-modal-title">保存印章图片</h2>
    <p class="save-modal-tip" id="save-modal-tip"></p>
    <div class="save-modal-img-wrap">
      <img id="save-modal-img" alt="印章预览" draggable="false">
    </div>
    <p class="save-modal-hint">提示：可长按上方图片 → 保存到相册</p>
  </div>
</div>

<script src="/js/defaults.js"></script>
<script src="/js/seal-renderer.js"></script>
<script src="/js/storage.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
